services:
  # Backend API
  - type: web
    name: finance-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: finance-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: finance-redis
          type: redis
          property: connectionString
      - key: CORS_ORIGINS
        value: https://finance.prathameshgalugade.in

  # PostgreSQL Database
  - type: pserv
    name: finance-db
    env: docker
    plan: free
    
  # Redis
  - type: redis
    name: finance-redis
    plan: free
    maxmemoryPolicy: noeviction
